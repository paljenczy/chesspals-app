name: chesspals
description: A kid-friendly chess app — bot play, puzzles, and safe human matchmaking.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Chess core
  dartchess: ^0.12.3
  chessground: ^9.0.0
  fast_immutable_collections: ^11.1.0

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^14.2.7

  # Networking
  http: ^1.2.1
  web_socket_channel: ^3.0.1

  # Local storage
  sqflite: ^2.3.3+1
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0

  # Utilities
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  intl: ^0.20.2

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  audioplayers: ^6.6.0
  url_launcher: ^6.3.2
  app_links: ^7.0.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.3
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/avatars/
    - assets/kid_avatars/
    - assets/bot_avatars/
    - assets/bot_avatars/bee/
    - assets/bot_avatars/butterfly/
    - assets/bot_avatars/hummingbird/
    - assets/bot_avatars/rabbit/
    - assets/bot_avatars/kangaroo/
    - assets/bot_avatars/deer/
    - assets/bot_avatars/giraffe/
    - assets/bot_avatars/tiger/
    - assets/sounds/
