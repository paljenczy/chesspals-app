name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > src/android/release.keystore

      - name: Write key.properties
        run: |
          cat > src/android/key.properties <<EOF
          storeFile=../release.keystore
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        working-directory: src
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME}
          cp src/build/app/outputs/flutter-apk/app-release.apk chesspals-${VERSION}.apk

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ChessPals ${{ github.ref_name }}
          files: chesspals-${{ github.ref_name }}.apk
          body: |
            ## What's new

            <!-- Fill in release notes before publishing -->

            ## Install

            1. Download the APK below
            2. On your Android tablet: Settings → Security → enable **Install unknown apps** for your browser/file manager
            3. Tap the downloaded APK to install
